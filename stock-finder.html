<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Rajnandini – Stock Finder</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0d2a28;
      --surface:  #0f3330;
      --card:     #123d39;
      --border:   #1e5550;
      --gold:     #c9a84c;
      --gold2:    #e8c97a;
      --text:     #f5ede0;
      --muted:    #7a9e9b;
      --success:  #4caf86;
      --warning:  #d4a017;
      --low:      #c0624a;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: Georgia, 'Times New Roman', serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(201,168,76,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(201,168,76,0.04) 1px, transparent 1px);
      background-size: 36px 36px;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 820px;
      margin: 0 auto;
      padding: 36px 18px 80px;
    }

    /* ── HEADER ── */
    header {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 40px;
    }

    .logo-img {
      width: 240px;
      max-width: 80vw;
      margin-bottom: 6px;
      filter: drop-shadow(0 2px 12px rgba(201,168,76,0.25));
    }

    .tagline {
      font-size: 11px;
      letter-spacing: 3px;
      color: var(--gold);
      text-transform: uppercase;
      opacity: 0.7;
    }

    /* ── SEARCH ── */
    .search-wrap {
      position: relative;
      margin-bottom: 8px;
    }

    .search-icon {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--gold);
      font-size: 18px;
      pointer-events: none;
    }

    #searchInput {
      width: 100%;
      background: var(--surface);
      border: 1.5px solid var(--border);
      color: var(--text);
      font-family: 'Courier New', Courier, monospace;
      font-size: 15px;
      padding: 16px 48px 16px 46px;
      border-radius: 6px;
      outline: none;
      letter-spacing: 1.5px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    #searchInput::placeholder { color: var(--muted); font-size: 13px; letter-spacing: 1px; }
    #searchInput:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(201,168,76,0.1);
    }

    .clear-btn {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--muted);
      font-size: 18px;
      cursor: pointer;
      display: none;
      padding: 4px;
      transition: color 0.2s;
    }
    .clear-btn:hover { color: var(--gold); }

    .search-hint {
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 24px;
      padding-left: 4px;
      letter-spacing: 0.5px;
      font-family: 'Courier New', monospace;
    }

    /* ── STATUS ── */
    #statusBar {
      font-family: 'Courier New', monospace;
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 18px;
      display: flex;
      align-items: center;
      gap: 8px;
      min-height: 18px;
    }
    .status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--success);
      animation: pulse 2s infinite;
      flex-shrink: 0;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

    /* ── RESULTS ── */
    #results { display: grid; gap: 14px; }

    .sku-group {
      background: var(--card);
      border: 1px solid var(--border);
      border-top: 2px solid var(--gold);
      border-radius: 8px;
      overflow: hidden;
      animation: fadeUp 0.25s ease both;
    }
    @keyframes fadeUp {
      from { opacity:0; transform:translateY(10px); }
      to   { opacity:1; transform:translateY(0); }
    }

    /* SKU header row */
    .sku-header {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
      background: rgba(201,168,76,0.04);
    }

    .sku-img {
      width: 200px; height: 200px;
      border-radius: 10px;
      object-fit: cover;
      border: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }
    .sku-img-placeholder {
      width: 200px; height: 200px;
      border-radius: 10px;
      border: 1px dashed var(--border);
      background: var(--surface);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 52px;
      flex-shrink: 0;
    }

    .sku-info { flex: 1; min-width: 0; }

    .sku-code {
      font-family: 'Courier New', monospace;
      font-size: 14px;
      font-weight: bold;
      color: var(--gold2);
      letter-spacing: 1.5px;
      word-break: break-all;
    }

    .sku-meta {
      font-size: 11px;
      color: var(--muted);
      margin-top: 3px;
      font-family: 'Courier New', monospace;
    }

    .total-block { text-align: right; flex-shrink: 0; }
    .total-stock {
      font-family: 'Courier New', monospace;
      font-size: 26px;
      font-weight: bold;
      color: var(--success);
      line-height: 1;
    }
    .total-label {
      font-size: 9px;
      color: var(--muted);
      letter-spacing: 2px;
      text-transform: uppercase;
      font-family: 'Courier New', monospace;
    }

    /* ── BIN ROWS ── */
    .bin-list { padding: 0 18px; }

    .bin-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid rgba(30,85,80,0.4);
    }
    .bin-row:last-child { border-bottom: none; }

    .bin-icon {
      width: 26px; height: 26px;
      border-radius: 4px;
      background: rgba(201,168,76,0.08);
      border: 1px solid rgba(201,168,76,0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      flex-shrink: 0;
    }

    .bin-name {
      font-family: 'Courier New', monospace;
      font-size: 14px;
      font-weight: bold;
      color: var(--text);
      letter-spacing: 1px;
      flex-shrink: 0;
    }

    /* stock badge right next to bin name */
    .bin-stock {
      font-family: 'Courier New', monospace;
      font-weight: bold;
      font-size: 13px;
      padding: 3px 10px;
      border-radius: 4px;
      min-width: 40px;
      text-align: center;
      margin-left: 4px;
    }
    .stock-high { background: rgba(76,175,134,0.15); color: var(--success); border: 1px solid rgba(76,175,134,0.3); }
    .stock-mid  { background: rgba(212,160,23,0.15);  color: var(--warning); border: 1px solid rgba(212,160,23,0.3); }
    .stock-low  { background: rgba(192,98,74,0.15);   color: var(--low);     border: 1px solid rgba(192,98,74,0.3); }

    /* spacer pushes nothing — stock badge is right after bin name */
    .bin-spacer { flex: 1; }

    /* ── STATES ── */
    .state-box {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
      font-family: 'Courier New', monospace;
      font-size: 13px;
      line-height: 2;
    }
    .state-box .big { font-size: 38px; margin-bottom: 12px; }

    .loader {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 60px;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      color: var(--gold);
    }
    .spinner {
      width: 20px; height: 20px;
      border: 2px solid rgba(201,168,76,0.2);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    footer {
      text-align: center;
      margin-top: 56px;
      font-family: 'Courier New', monospace;
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 1px;
    }

    .gold-divider {
      width: 60px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      margin: 10px auto 0;
    }
  </style>
</head>

<script>
  const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTo-H0Ua25CjRakkdYCIwpkILmqjawbxBiZWmVdZPdV3yS_xwOw6LnfecYCKD3A7SRvRs9zWWPBhrBP/pub?output=csv&gid=0';
  const REFRESH_MS = 5 * 60 * 1000;

  let allRows = [];

  const input    = document.getElementById('searchInput');
  const clearBtn = document.getElementById('clearBtn');
  const results  = document.getElementById('results');
  const statusTxt= document.getElementById('statusText');

  function splitCSVLine(line) {
    const result = []; let cur = '', inQ = false;
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (ch === '"') { inQ = !inQ; }
      else if (ch === ',' && !inQ) { result.push(cur); cur = ''; }
      else { cur += ch; }
    }
    result.push(cur);
    return result;
  }

  function findCol(headers, candidates) {
    for (const c of candidates) {
      const idx = headers.findIndex(h => h.includes(c));
      if (idx !== -1) return idx;
    }
    return -1;
  }

  function parseCSV(text) {
    const lines = text.split('\n').map(l => l.trim()).filter(Boolean);
    if (lines.length < 2) return [];
    let headerIdx = 0;
    for (let i = 0; i < Math.min(10, lines.length); i++) {
      if (lines[i].toLowerCase().includes('sku code')) { headerIdx = i; break; }
    }
    const headers = splitCSVLine(lines[headerIdx]).map(h => h.trim().toLowerCase().replace(/[^a-z0-9]/g,''));
    const skuCol   = findCol(headers, ['skucode','sku']);
    const shelfCol = findCol(headers, ['shelf','bin','location']);
    const stockCol = findCol(headers, ['available','atf','qty','stock']);
    const imgCol   = findCol(headers, ['imagelink','image','img','link']);
    const rows = [];
    for (let i = headerIdx + 1; i < lines.length; i++) {
      const cols  = splitCSVLine(lines[i]);
      const sku   = (cols[skuCol]   || '').trim();
      const shelf = (cols[shelfCol] || '').trim();
      const stock = parseInt((cols[stockCol] || '0').trim()) || 0;
      const image = (cols[imgCol]   || '').trim();
      if (sku) rows.push({ sku, shelf, stock, image });
    }
    return rows;
  }

  async function loadData() {
    statusTxt.textContent = 'Syncing...';
    try {
      const resp = await fetch(CSV_URL + '&t=' + Date.now());
      if (!resp.ok) throw new Error('HTTP ' + resp.status);
      const text = await resp.text();
      allRows = parseCSV(text);
      const now = new Date();
      statusTxt.textContent = allRows.length + ' entries loaded · ' + now.toLocaleTimeString('en-IN');
      render(input.value.trim());
    } catch(e) {
      statusTxt.textContent = 'Error: ' + e.message;
      results.innerHTML = '<div class="state-box"><div class="big">⚠️</div>Sheet load failed.<br>' + e.message + '</div>';
    }
  }

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function render(query) {
    if (!allRows.length) return;
    if (!query) {
      results.innerHTML = '<div class="state-box"><div class="big">🔍</div>SKU code type karein<br>bin aur stock dikhai dega</div>';
      return;
    }
    const q = query.toUpperCase();
    const matched = allRows.filter(r => r.sku.toUpperCase().includes(q));
    if (!matched.length) {
      results.innerHTML = '<div class="state-box"><div class="big">📭</div>No SKU found: <strong>' + escHtml(query) + '</strong><br>Try a shorter code</div>';
      return;
    }

    const grouped = {};
    for (const row of matched) {
      if (!grouped[row.sku]) grouped[row.sku] = { sku: row.sku, bins: [], image: '' };
      grouped[row.sku].bins.push({ shelf: row.shelf, stock: row.stock });
      if (!grouped[row.sku].image && row.image) grouped[row.sku].image = row.image;
    }

    results.innerHTML = Object.values(grouped).map((g, i) => {
      const total = g.bins.reduce((s,b) => s + b.stock, 0);
      const imgHtml = g.image
        ? '<img class="sku-img" src="' + escHtml(g.image) + '" alt="' + escHtml(g.sku) + '" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\'">'
          + '<div class="sku-img-placeholder" style="display:none">🧵</div>'
        : '<div class="sku-img-placeholder">🧵</div>';

      const binRows = g.bins.map(b => {
        const cls = b.stock >= 20 ? 'stock-high' : b.stock >= 5 ? 'stock-mid' : 'stock-low';
        return '<div class="bin-row">'
          + '<div class="bin-icon">📍</div>'
          + '<span class="bin-name">' + escHtml(b.shelf || '—') + '</span>'
          + '<span class="bin-stock ' + cls + '">' + b.stock + '</span>'
          + '<div class="bin-spacer"></div>'
          + '</div>';
      }).join('');

      return '<div class="sku-group" style="animation-delay:' + (i*0.04) + 's">'
        + '<div class="sku-header">'
        + imgHtml
        + '<div class="sku-info">'
        + '<div class="sku-code">' + escHtml(g.sku) + '</div>'
        + '<div class="sku-meta">' + g.bins.length + ' bin' + (g.bins.length !== 1 ? 's' : '') + '</div>'
        + '</div>'
        + '<div class="total-block">'
        + '<div class="total-stock">' + total + '</div>'
        + '<div class="total-label">Total</div>'
        + '</div>'
        + '</div>'
        + '<div class="bin-list">' + binRows + '</div>'
        + '</div>';
    }).join('');
  }

  input.addEventListener('input', () => {
    const v = input.value.trim();
    clearBtn.style.display = v ? 'block' : 'none';
    render(v);
  });
  clearBtn.addEventListener('click', () => {
    input.value = '';
    clearBtn.style.display = 'none';
    input.focus();
    render('');
  });

  loadData();
  setInterval(loadData, REFRESH_MS);
</script>
</body>
</html>
